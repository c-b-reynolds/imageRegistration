augmentation:
  erasing_ratio:
  - 0.3
  - 3.0
  erasing_scale:
  - 0.02
  - 0.2
  use_erasing: true
  use_rotation: true
data:
  augmentation: true
  image_size:
  - 192
  - 192
  - 160
  num_workers: 0
  patches_path: dataset/patches.npy
  pin_memory: true
  root: data
  seed: 42
  test_frac: 0.15
  test_split: 0.15
  train_split: 0.7
  val_frac: 0.15
  val_split: 0.15
evaluation:
  bootstrap_n: 1000
  metrics:
  - ncc
  - ssim
  - dice
  - jacobian_det
  significance_alpha: 0.05
experiment:
  name: hybrid_ode_sar
  output_dir: outputs
  seed: 42
  tags: []
logging:
  backend: tensorboard
  wandb_entity: ''
  wandb_project: image-registration
loss:
  regularization: deformation_gradient
  regularization_weight: 0.1
  similarity: ncc
  similarity_weight: 1.0
model:
  adjoint: false
  base_features: 16
  depth: 4
  dropout: 0.1
  embed_dim: 64
  ffn_dim: 256
  in_channels: 1
  int_steps: 7
  kernel_size: 8
  method: rk4
  n_t: 5
  name: HybridODERegistration
  nhead: 4
  num_decoder_layers: 2
  num_encoder_layers: 2
  padding: 0
  pool_type: max
  stem_channels: 32
  stem_hidden_dim: 32
  stride: 8
  tgt_mode: encoder_output
training:
  batch_size: 16
  early_stopping_patience: 10
  epochs: 50
  gradient_clip: 1.0
  log_every: 10
  lr: 0.0001
  lr_min: 1.0e-06
  lr_scheduler: cosine
  optimizer: adam
  val_every: 1
  weight_decay: 1.0e-05
