data:
  augmentation: true
  format: numpy
  image_size:
  - 64
  - 64
  num_pairs: 200
  num_workers: 0
  pin_memory: true
  root: data
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
evaluation:
  bootstrap_n: 200
  metrics:
  - ncc
  - ssim
  - jacobian_det
  significance_alpha: 0.05
experiment:
  name: simple_cnn_numpy
  output_dir: results
  seed: 42
  tags:
  - demo
logging:
  backend: tensorboard
  wandb_entity: ''
  wandb_project: image-registration
loss:
  regularization: l2
  regularization_weight: 0.01
  similarity: ncc
  similarity_weight: 1.0
model:
  base_features: 16
  depth: 4
  features: 32
  in_channels: 1
  int_steps: 0
  name: SimpleCNN
training:
  batch_size: 4
  early_stopping_patience: 10
  epochs: 50
  gradient_clip: 1.0
  log_every: 10
  lr: 0.0001
  lr_min: 1.0e-06
  lr_scheduler: cosine
  optimizer: adam
  val_every: 1
  weight_decay: 0.0
