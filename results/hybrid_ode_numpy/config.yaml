data:
  augmentation: true
  format: numpy
  image_size:
  - 64
  - 64
  num_pairs: 200
  num_workers: 0
  pin_memory: true
  root: data
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
evaluation:
  bootstrap_n: 200
  metrics:
  - ncc
  - ssim
  - jacobian_det
  significance_alpha: 0.05
experiment:
  name: hybrid_ode_numpy
  output_dir: results
  seed: 42
  tags:
  - hybrid
  - neural-ode
  - transformer
logging:
  backend: tensorboard
  wandb_entity: ''
  wandb_project: image-registration
loss:
  regularization: l2
  regularization_weight: 0.01
  similarity: ncc
  similarity_weight: 1.0
model:
  adjoint: true
  atol: 0.0001
  base_features: 16
  depth: 4
  dropout: 0.1
  embed_dim: 256
  ffn_dim: null
  in_channels: 1
  int_steps: 7
  kernel_size: 8
  method: rk4
  n_t: 10
  name: HybridODERegistration
  nhead: 4
  num_decoder_layers: 1
  num_encoder_layers: 1
  padding: 0
  pool_type: max
  rtol: 0.001
  stem_channels: 512
  stem_hidden_dim: 512
  stride: 8
  tgt_mode: encoder_output
training:
  batch_size: 4
  early_stopping_patience: 10
  epochs: 50
  gradient_clip: 1.0
  log_every: 10
  lr: 0.0001
  lr_min: 1.0e-06
  lr_scheduler: cosine
  optimizer: adam
  val_every: 1
  weight_decay: 1.0e-05
