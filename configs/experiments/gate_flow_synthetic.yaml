# GateFlow on synthetic shape patches

experiment:
  name: gate_flow_synthetic_jac_1
  seed: 42
  output_dir: outputs

data:
  patches_path: dataset/synthetic_patches.npy
  val_frac:  0.15
  test_frac: 0.15
  seed: 42
  num_workers: 0

model:
  name: GateFlow
  in_channels:         1
  hidden_channels:     256  # C — stem output half-width and gate width
  kernel_size:         8    # k — square stem conv kernel
  stride:              4    # s — coarse res: H' = H/s = 16 for 64x64
  bottleneck_channels: 256  # K — tanh bottleneck width
  n_pe:                256  # n — PE channels (must be divisible by 4 = 8 frequencies)
  n_t:                 20

loss:
  similarity:            ncc
  regularization:        l2
  similarity_weight:     1.0
  regularization_weight: 0.1
  ncc_win:               9
  jacobian_det_weight:   100   # set > 0 to enable  — penalises folds only
  jacobian_eps:          1e-3  # margin: penalises det(J) < -eps
  log_jacobian_weight:   200 # set > 0 to enable  — penalises volume change
  log_jacobian_clamp:    1e-5  # clamp det to this before log (avoids log(0))

training:
  epochs:                   5
  batch_size:               16
  optimizer:                adam
  lr:                       1.0e-4
  weight_decay:             1.0e-5
  lr_scheduler:             none
  lr_min:                   1.0e-6
  gradient_clip:            1.0
  early_stopping_patience:  15
  val_every:                1

augmentation:
  use_rotation: false
  use_erasing:  false
